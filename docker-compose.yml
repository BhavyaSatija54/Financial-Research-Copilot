version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: financial-research-copilot:latest
    container_name: frc-api
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-3-small}
      - REDIS_URL=redis://redis:6379/0
      - CACHE_ENABLED=true
      - API_KEY=${API_KEY:-change-me}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FORMAT=json
      - SEC_USER_AGENT=${SEC_USER_AGENT:-FinancialResearchCopilot/1.0 user@example.com}
    volumes:
      - frc-data:/app/data
      - frc-logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: frc-redis
    profiles: ["cache", "full"]
    ports:
      - "6379:6379"
    volumes:
      - frc-redis-data:/data
    command: redis-server --save 60 1 --loglevel warning
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  frc-data:
    driver: local
  frc-logs:
    driver: local
  frc-redis-data:
    driver: local

networks:
  default:
    name: frc-network
